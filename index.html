<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/support.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pizarra Soporte</title>
    <meta name="description" content="Una pizarra interactiva para crear y organizar tus ideas con post-its digitales." />
  </head>
  <body>
    <!-- Pantalla de login (se oculta cuando hay sesión válida) -->
    <div class="login-screen" id="login-screen" hidden>
      <form class="login-card" id="login-form">
        <img src="/support.svg" alt="" class="login-logo" width="56" height="56" />
        <h1>Pizarra Soporte</h1>
        <p class="login-sub">Inicia sesión para acceder</p>
        <input type="email" id="login-email" placeholder="Correo" autocomplete="username" required />
        <input type="password" id="login-password" placeholder="Contraseña" autocomplete="current-password" required />
        <button type="submit" id="login-btn">Entrar</button>
        <div class="login-error" id="login-error"></div>
      </form>
    </div>

    <div id="app" hidden>
      <div class="user-bar" id="user-bar">
        <span class="user-name" id="user-name"></span>
        <button class="logout-btn" id="logout-btn" title="Cerrar sesión">Salir</button>
      </div>
      <div class="board-container" id="board">
        <div class="chalk-tray"></div>
        <!-- Post-its will be injected here -->
      </div>
      
      <div class="overlay" id="overlay"></div>
      
      <div class="color-menu" id="color-menu">
        <div style="display: flex; gap: 10px;">
          <div class="color-option color-yellow" data-color="color-yellow" title="Amarillo"></div>
          <div class="color-option color-blue" data-color="color-blue" title="Azul"></div>
          <div class="color-option color-pink" data-color="color-pink" title="Rosa"></div>
          <div class="color-option color-green" data-color="color-green" title="Verde"></div>
          <div class="color-option color-purple" data-color="color-purple" title="Morado"></div>
        </div>
        <div class="priority-selector">
          <div class="priority-option p-red" data-priority="priority-red">ROJO</div>
          <div class="priority-option p-yellow" data-priority="priority-yellow">AMARILLO</div>
          <div class="priority-option p-green" data-priority="priority-green">VERDE</div>
          <div class="priority-option p-none" data-priority="">Ninguno</div>
        </div>
      </div>
      
      <button class="add-btn" id="add-btn" title="Añadir nota">+</button>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
